apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: app1 
  labels:
    purpose: ingress-demo 
    project: roboshop 
    app: app1 
spec:
  replicas: 2
  selector: 
    matchLabels:
      purpose: ingress-demo 
      project: roboshop 
      app: app1 
  template:
    metadata:
      labels:
        purpose: ingress-demo 
        project: roboshop
        app: app1 
    spec:
      containers:
      - name: app1 
        image: singalasreenivasulu/app1:v1 
---
apiVersion: v1 
kind: Service 
metadata:
  name: app1 
spec:
  selector:
    purpose: ingress-demo 
    project: roboshop
    app: app1 
  ports:
    - protocol: TCP 
      port: 80 # service port
      targetPort: 80 # container port
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1 
  annotations: 
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:167819473967:certificate/8e5eba4b-bb61-4eec-ac26-e4957102f822
    alb.ingress.kubernetes.io/scheme: internet-facing 
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=roboshop
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - host: "app1.daws96s.fun"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app1
            port:
              number: 80
  

